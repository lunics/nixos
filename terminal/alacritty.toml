[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[font]
size = 22.0

[scrolling]
history    = 10000
multiplier = 3

[selection]
save_to_clipboard     = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

# [terminal.shell]
# program = "tmux"

[window]
decorations     = "none"
dynamic_padding = true
dynamic_title   = false
opacity         = 0.7

[window.dimensions]
columns = 170
lines   = 45

[window.padding]
x = 5
y = 1

[[keyboard.bindings]]
action = "Copy"
key    = "C"
mods   = "Alt"

[[keyboard.bindings]]
action = "Paste"
key    = "V"
mods   = "Alt"
